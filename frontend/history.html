<!DOCTYPE html>
<html>
<head>
    <title>Prediction History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>

<div class="container">
    <h1>📜 Prediction History</h1>

    <table class="history-table">
        <tr>
            <th>Image</th>
            <th>Grade</th>
            <th>Confidence</th>
            <th>Time</th>
        </tr>

        {% for row in records %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}%</td>
            <td>{{ row[3] }}</td>
        </tr>
        {% endfor %}
    </table>

    <br>
    <a href="/"><button>⬅ Back</button></a>
</div>

</body>
</html>
